region: ap-southeast-1
services:
- name: common
  action: wait
  duration: PT30S
  use_fis: false
- name: asg
  action: scale
  tags: environment=development,project=clouddash
  start_after: common:wait
  parameters:
    max: 2
    # min defaults to 0 when omitted.
    min: 0
    # desired defaults to max when omitted.
    desired: 2
    wait_for_ready: true
    timeout_seconds: 900
