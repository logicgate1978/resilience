region: ap-southeast-1
# This manifest is designed for EKS pod fault testing.
# Enable one EKS action block at a time unless you intentionally want parallel faults.

services:
- name: eks
  action: scale-deployment
  target:
    cluster_identifier: resilience-eks-20260328122508
    namespace: default
    deployment_name: my-service
  parameters:
    replicas: 0
    wait_for_ready: true
    timeout_seconds: 600

# CPU stress example.
# - name: eks
#   action: pod-cpu-stress
#   duration: PT2M
#   target:
#     # Replace this with your real EKS cluster name.
#     cluster_identifier: resilience-eks-20260328122508
#     namespace: default
#     selector_type: labelSelector
#     selector_value: app=my-service
#     count: 1
#   parameters:
#     kubernetes_service_account: myserviceaccount
#     workers: 1
#     percent: 80
#     max_errors_percent: 0
#     fis_pod_security_policy: baseline

# CPU stress alternative using the shorter manifest action synonym.
