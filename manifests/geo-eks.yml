services:
- name: eks
  action: scale-deployment
  region: ap-southeast-1
  target:
    cluster_identifier: resilience-eks-20260328122508
    namespace: default
    deployment_name: my-service
  parameters:
    replicas: 2
    wait_for_ready: true
    timeout_seconds: 600

- name: eks
  action: scale-deployment
  region: ap-southeast-2
  target:
    cluster_identifier: resilience-eks-20260328130249
    namespace: default
    deployment_name: my-service
  parameters:
    replicas: 0
    wait_for_ready: true
    timeout_seconds: 600
  start_after: eks:scale-deployment#1
