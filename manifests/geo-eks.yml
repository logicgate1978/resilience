resilience_test_type: region
primary_region: ap-southeast-1
secondary_region: ap-southeast-2

services:
- name: eks
  action: scale-deployment
  target:
    region: secondary
    cluster_identifier: my-secondary-eks-cluster
    namespace: default
    deployment_name: my-service
  parameters:
    replicas: 3
    wait_for_ready: true
    timeout_seconds: 600

- name: eks
  action: scale-deployment
  target:
    region: primary
    cluster_identifier: my-primary-eks-cluster
    namespace: default
    deployment_name: my-service
  parameters:
    replicas: 0
    wait_for_ready: true
    timeout_seconds: 600