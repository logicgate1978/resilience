region: ap-southeast-1

services:
- name: asg
  action: scale
  tags: Name=resilience-asg-web-instance
  parameters:
    max: 2
    wait_for_ready: true
    timeout_seconds: 900

- name: ec2
  action: stop
  tags: Name=resilience-asg-web-instance
  duration: PT1M

- name: common
  action: wait
  duration: PT1M
  start_after: ec2:stop

- name: ec2
  action: terminate
  tags: Name=resilience-asg-web-instance
  start_after: common:wait#1

- name: common
  action: wait
  duration: PT1M
  start_after: ec2:terminate

- name: rds
  action: reboot
  tags: Name=test
  start_after: common:wait#2