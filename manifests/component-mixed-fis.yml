region: ap-southeast-1

services:
- name: ec2
  action: stop
  tags: Name=test
  duration: PT2M

- name: common
  action: wait
  duration: PT2M
  start_after: ec2:stop

- name: ec2
  action: terminate
  tags: Name=test
  start_after: ec2:stop

- name: common
  action: wait
  duration: PT2M
  start_after: ec2:terminate

- name: rds
  action: reboot
  tags: Name=test
  start_after: common:wait