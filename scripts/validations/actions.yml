actions:
  - action: asg:scale
    validations:
      - verify_resource_existence
      - verify_scale_values
  - action: ec2:terminate
    validations:
      - verify_resource_existence
  - action: rds:reboot
    validations:
      - verify_resource_existence
      - verify_replica
  - action: rds:failover
    validations:
      - verify_resource_existence
      - verify_replica
  - action: eks:scale-deployment
    validations:
      - verify_deployment_existence
      - verify_replicas_value
  - action: s3:pause-replication
    validations:
      - verify_resource_existence
  - action: s3:pause-relication
    validations:
      - verify_resource_existence
