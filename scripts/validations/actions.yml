actions:
  - action: asg:scale
    validations:
      - verify_resource_existence
      - verify_scale_values
  - action: dns:set-value
    validations:
      - verify_record_exists
      - verify_value_present
      - verify_simple_record_target
  - action: dns:set-weight
    validations:
      - verify_record_exists
      - verify_value_present
      - verify_weight_targets
  - action: efs:failover
    validations:
      - verify_resource_existence
      - verify_replication_configuration_exists
  - action: efs:failback
    validations:
      - verify_resource_existence
      - verify_failback_target
      - verify_failback_state
  - action: efs:failback-safe
    validations:
      - verify_resource_existence
      - verify_failback_target
      - verify_failback_state
      - verify_failback_safe_parameters
  - action: ec2:terminate
    validations:
      - verify_resource_existence
  - action: ec2:reboot
    validations:
      - verify_resource_existence
  - action: ec2:stop
    validations:
      - verify_resource_existence
  - action: rds:reboot
    validations:
      - verify_resource_existence
  - action: rds:failover
    validations:
      - verify_resource_existence
      - verify_replica
  - action: eks:scale-deployment
    validations:
      - verify_deployment_existence
      - verify_replicas_value
  - action: eks:scale-nodegroup
    validations:
      - verify_nodegroup_existence
      - verify_nodegroup_scale_values
  - action: network:disrupt-vpc-endpoint
    validations:
      - verify_vpc_endpoint_type
      - verify_resource_existence
  - action: s3:pause-replication
    validations:
      - verify_resource_existence
  - action: s3:pause-relication
    validations:
      - verify_resource_existence
  - action: s3:failover
    validations:
      - verify_mrap_selector
      - verify_mrap_failover_state
